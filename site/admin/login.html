<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="/css/themes.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="login-page" data-theme="modern">
    <div class="login-card">
      <h1 class="login-title">Site Admin</h1>
      <p class="login-subtitle">Enter your password to edit your website.</p>
      <form class="login-form" id="loginForm">
        <div id="loginError" class="login-error" style="display:none"></div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" name="password" required autofocus>
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
      </form>
    </div>
  </div>
  <script src="/js/config.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = e.target.password.value;
      const errorEl = document.getElementById("loginError");
      errorEl.style.display = "none";

      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Login failed");
        localStorage.setItem("site_token", data.token);
        window.location.href = "/admin/edit.html";
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = "block";
      }
    });
  </script>
</body>
</html>
